<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Endless Parkour Multiplayer - Node.js</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body { margin: 0; padding: 0; background: #0b0b16; color: #fff; font-family: 'Segoe UI', Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #gameWrapper { position: relative; width: 1000px; height: 500px; display: flex; gap: 15px; }
        canvas { background: transparent; border: 3px solid #0f3460; display: block; box-shadow: 0 0 25px rgba(15, 52, 96, 0.5); }
        #leaderboard { width: 180px; height: 500px; background: rgba(15, 22, 38, 0.9); border: 3px solid #0f3460; padding: 15px; border-radius: 4px; box-shadow: 0 0 25px rgba(15, 52, 96, 0.5); overflow-y: auto; }
        #leaderboard h3 { margin-top: 0; color: #e94560; text-align: center; border-bottom: 2px solid #0f3460; padding-bottom: 8px; font-size: 16px; }
        .lb-item { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        #menuOverlay { position: absolute; top: 0; left: 0; width: 800px; height: 100%; background: rgba(11, 11, 22, 0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; border: 3px solid transparent; }
        h1 { font-size: 42px; margin-bottom: 10px; color: #e94560; text-shadow: 0 0 10px rgba(233,69,96,0.5); text-align: center; }
        p { margin-bottom: 30px; color: #848ccf; text-align: center; padding: 0 20px; }
        button { padding: 15px 40px; font-size: 20px; font-weight: bold; background: #e94560; color: white; border: none; border-radius: 30px; cursor: pointer; box-shadow: 0 5px 15px rgba(233,69,96,0.4); transition: 0.2s; }
        button:active { transform: scale(0.95); }
        #mobileControls { position: absolute; bottom: 20px; left: 0; width: 800px; display: none; justify-content: space-between; padding: 0 30px; z-index: 5; }
        .dpad { display: flex; gap: 15px; }
        .btn { width: 70px; height: 70px; background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 24px; color: white; }
        .btn:active { background: rgba(233,69,96,0.6); }
        @media (max-width: 1050px) { #mobileControls { display: flex; } }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <div id="gameWrapper">
        <div id="menuOverlay">
            <h1 id="menuTitle">PARKOUR ENDLESS</h1>
            <p id="menuDesc">Ăn xu, né bẫy gai và hố tử thần. Đua TOP bảng xếp hạng thời gian thực!</p>
            <button id="startBtn">VÀO CHƠI</button>
        </div>
        
        <canvas id="gameCanvas" width="800" height="500"></canvas>

        <div id="leaderboard">
            <h3>BẢNG XẾP HẠNG</h3>
            <div id="lbList"></div>
        </div>

        <div id="mobileControls">
            <div class="dpad">
                <div class="btn" id="btnLeft">◀</div>
                <div class="btn" id="btnRight">▶</div>
            </div>
            <div class="btn" id="btnJump">▲</div>
        </div>
    </div>

<script>
    const socket = io();
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let myId = null;
    const pSize = 30;
    
    let localPlayer = { x: 100, y: 350, vy: 0, isGrounded: true, inMenu: true, isDead: false };
    let players = {};
    let obstacles = [];
    let spikes = [];
    let coins = [];
    let stars = [];
    let gameSpeed = 4;

    const gravity = 0.6;
    const jumpForce = -12;
    const speed = 5;
    const groundY = 350;

    for (let i = 0; i < 60; i++) {
        stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * (canvas.height - 120),
            size: Math.random() * 2,
            speed: Math.random() * 0.5 + 0.1
        });
    }

    socket.on('init', (id) => { myId = id; });

    socket.on('gameUpdate', (data) => {
        obstacles = data.obstacles;
        spikes = data.spikes;
        coins = data.coins;
        gameSpeed = data.gameSpeed;
        players = data.players;
        updateLeaderboard();
    });

    const keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
    window.addEventListener('keydown', (e) => { if(e.key in keys) keys[e.key] = true; });
    window.addEventListener('keyup', (e) => { if(e.key in keys) keys[e.key] = false; });

    const mobileKeys = { left: false, right: false, jump: false };
    setupMobileButton('btnLeft', 'left');
    setupMobileButton('btnRight', 'right');
    setupMobileButton('btnJump', 'jump');

    function setupMobileButton(id, keyName) {
        const btn = document.getElementById(id);
        if(!btn) return;
        btn.addEventListener('touchstart', (e) => { e.preventDefault(); mobileKeys[keyName] = true; });
        btn.addEventListener('touchend', (e) => { e.preventDefault(); mobileKeys[keyName] = false; });
    }

    document.getElementById('startBtn').addEventListener('click', () => {
        document.getElementById('menuOverlay').style.display = 'none';
        localPlayer.inMenu = false;
        localPlayer.isDead = false;
        localPlayer.x = 100;
        localPlayer.y = groundY;
        socket.emit('joinGame');
    });

    function updateLeaderboard() {
        const lbList = document.getElementById('lbList');
        lbList.innerHTML = '';
        
        let sorted = Object.values(players)
            .filter(p => !p.inMenu)
            .sort((a, b) => b.score - a.score);

        sorted.forEach((p, index) => {
            let item = document.createElement('div');
            item.className = 'lb-item';
            if(p.id === myId) item.style.color = '#00fff0';
            item.innerHTML = `<span>${index + 1}. ${p.id.substr(0,4)}</span> <span>${Math.floor(p.score)} P</span>`;
            lbList.appendChild(item);
        });
    }

    function updatePhysics() {
        if (localPlayer.inMenu || localPlayer.isDead) return;

        if (keys.a || keys.ArrowLeft || mobileKeys.left) localPlayer.x -= speed;
        if (keys.d || keys.ArrowRight || mobileKeys.right) localPlayer.x += speed;

        if (localPlayer.x < 0) localPlayer.x = 0;
        if (localPlayer.x > canvas.width - pSize) localPlayer.x = canvas.width - pSize;

        if ((keys.w || keys.ArrowUp || mobileKeys.jump) && localPlayer.isGrounded) {
            localPlayer.vy = jumpForce;
            localPlayer.isGrounded = false;
        }

        localPlayer.vy += gravity;
        localPlayer.y += localPlayer.vy;

        stars.forEach(star => {
            star.x -= star.speed * (gameSpeed * 0.2);
            if (star.x < 0) star.x = canvas.width;
        });

        let isOnPlatform = localPlayer.y >= groundY;
        obstacles.forEach(obs => {
            if (localPlayer.x + pSize > obs.x && localPlayer.x < obs.x + obs.w) {
                if (localPlayer.y >= groundY) isOnPlatform = false;
            }
        });

        if (isOnPlatform) {
            localPlayer.y = groundY;
            localPlayer.vy = 0;
            localPlayer.isGrounded = true;
        }

        spikes.forEach(spk => {
            if (localPlayer.x + pSize - 4 > spk.x && localPlayer.x + 4 < spk.x + spk.w) {
                if (localPlayer.y + pSize > spk.y && localPlayer.y < spk.y + spk.h) {
                    localPlayer.isDead = true;
                    socket.emit('playerKilled');
                    showGameOverMenu();
                }
            }
        });

        coins.forEach((c, index) => {
            if (!c.collected) {
                let pCenterX = localPlayer.x + pSize / 2;
                let pCenterY = localPlayer.y + pSize / 2;
                let dist = Math.hypot(pCenterX - c.x, pCenterY - c.y);
                if (dist < pSize / 2 + c.r) {
                    socket.emit('coinCollected', index);
                }
            }
        });

        if (localPlayer.y > canvas.height) {
            localPlayer.isDead = true;
            socket.emit('playerKilled');
            showGameOverMenu();
        }

        socket.emit('playerInput', { x: localPlayer.x, y: localPlayer.y });
    }

    function showGameOverMenu() {
        let me = players[myId] || { score: 0, coinsCollected: 0 };
        document.getElementById('menuOverlay').style.display = 'flex';
        document.getElementById('menuTitle').innerText = "BẠN ĐÃ HY SINH!";
        document.getElementById('menuDesc').innerText = `Điểm đạt được: ${Math.floor(me.score)} P | Số xu nhặt: ${me.coinsCollected} 🪙`;
        document.getElementById('startBtn').innerText = "CHƠI LẠI";
    }

    function draw() {
        let bgGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        bgGradient.addColorStop(0, '#0b0b16');
        bgGradient.addColorStop(0.7, '#141432');
        bgGradient.addColorStop(1, '#1e1b4b');
        ctx.fillStyle = bgGradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#ffffff';
        stars.forEach(star => {
            ctx.globalAlpha = Math.random() * 0.4 + 0.6;
            ctx.fillRect(star.x, star.y, star.size, star.size);
        });
        ctx.globalAlpha = 1.0;

        updatePhysics();

        ctx.fillStyle = '#0f3460';
        ctx.fillRect(0, canvas.height - 120, canvas.width, 120);

        obstacles.forEach(obs => {
            ctx.fillStyle = '#0b0b16';
            ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
            ctx.strokeStyle = '#e94560';
            ctx.lineWidth = 3;
ctx.strokeRect(obs.x, obs.y, obs.w, obs.h);});spikes.forEach(spk => {ctx.fillStyle = '#ff4a4a';ctx.beginPath();ctx.moveTo(spk.x, spk.y + spk.h);ctx.lineTo(spk.x + spk.w / 2, spk.y);ctx.lineTo(spk.x + spk.w, spk.y + spk.h);ctx.closePath();ctx.fill();ctx.strokeStyle = '#fff';ctx.lineWidth = 1;ctx.stroke();});coins.forEach(c => {if (c.collected) return;ctx.fillStyle = '#ffd700';ctx.beginPath();ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);ctx.fill();ctx.strokeStyle = '#fff';ctx.lineWidth = 1.5;ctx.stroke();});Object.keys(players).forEach(id => {const p = players[id];if (p.inMenu || p.isDead) return;ctx.fillStyle = p.color;ctx.fillRect(p.x, p.y, pSize, pSize);if (id === myId) {ctx.strokeStyle = '#ffffff';ctx.lineWidth = 3;ctx.strokeRect(p.x, p.y, pSize, pSize);ctx.fillStyle = '#fff';ctx.font = 'bold 18px sans-serif';ctx.fillText(Điểm số: ${Math.floor(p.score)}, 25, 40);ctx.fillText(Số xu: ${p.coinsCollected} 🪙, 25, 70);} else {ctx.fillStyle = 'rgba(255,255,255,0.7)';ctx.font = '12px sans-serif';ctx.fillText(p.id.substr(0, 4), p.x - 5, p.y - 10);}});requestAnimationFrame(draw);}draw();
